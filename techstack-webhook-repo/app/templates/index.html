<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Activity Feed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292e;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-shadow: 0 1px 3px rgba(27,31,35,0.12);
        }
        h2 {
            margin-top: 0;
            border-bottom: 1px solid #e1e4e8;
            padding-bottom: 10px;
        }
        .event-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .event-item {
            padding: 15px 0;
            border-bottom: 1px solid #e1e4e8;
            font-size: 14px;
        }
        .event-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Latest GitHub Actions</h2>
    <ul class="event-list" id="event-feed">
        <li class="event-item">Waiting for events...</li>
    </ul>
</div>

<script>
    async function fetchEvents() {
        try {
            const response = await fetch('/api/events');
            const events = await response.json();
            const feed = document.getElementById('event-feed');
            
            if (events.length === 0) {
                feed.innerHTML = '<li class="event-item">No events found.</li>';
                return;
            }

            feed.innerHTML = ''; 

            events.forEach(event => {
                let message = '';
                
                // Format the text based on the assessment requirements
                if (event.action === 'PUSH') {
                    message = `"${event.author}" pushed to "${event.to_branch}" on ${event.timestamp}`;
                } else if (event.action === 'PULL_REQUEST') {
                    message = `"${event.author}" submitted a pull request from "${event.from_branch}" to "${event.to_branch}" on ${event.timestamp}`;
                } else if (event.action === 'MERGE') {
                    message = `"${event.author}" merged branch "${event.from_branch}" to "${event.to_branch}" on ${event.timestamp}`;
                }

                const listItem = document.createElement('li');
                listItem.className = 'event-item';
                listItem.textContent = message;
                feed.appendChild(listItem);
            });
        } catch (error) {
            console.error('Error fetching events:', error);
        }
    }

    // Fetch immediately on load
    fetchEvents();

    // Poll every 15 seconds (15000 milliseconds)
    setInterval(fetchEvents, 15000);
</script>

</body>
</html>
